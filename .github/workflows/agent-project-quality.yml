name: "Agent: Project Quality (Definition of Done)"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  project-quality:
    name: Project Quality – Definition of Done
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Fetch base branch for diffing ────────────────────────────────
      - name: Fetch main branch
        run: git fetch origin main:refs/remotes/origin/main --depth=50

      # ── 3. Compute diff statistics ───────────────────────────────────────
      - name: Compute diff stats
        id: diff-stats
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          ADDITIONS=$(git diff --stat origin/main...HEAD | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          DELETIONS=$(git diff --stat origin/main...HEAD | tail -1 | grep -oP '\d+ deletion'  | grep -oP '\d+' || echo 0)
          echo "changed_files=${CHANGED_FILES}"  >> "$GITHUB_OUTPUT"
          echo "additions=${ADDITIONS}"          >> "$GITHUB_OUTPUT"
          echo "deletions=${DELETIONS}"          >> "$GITHUB_OUTPUT"

      # ── 4. PR description check ──────────────────────────────────────────
      - name: PR has a meaningful description
        id: pr-description
        uses: actions/github-script@v7
        with:
          script: |
            const body  = context.payload.pull_request.body || "";
            const words = body.trim().split(/\s+/).filter(Boolean).length;
            if (words < 10) {
              core.setFailed(`PR description is too short (${words} words). Minimum 10 words required to explain the change.`);
            } else {
              core.setOutput("words", words);
              console.log(`✅ PR description has ${words} words`);
            }

      # ── 5. PR is not a draft ──────────────────────────────────────────────
      - name: PR is not a draft
        id: pr-draft
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request.draft) {
              core.setFailed("PR is still a draft. Mark it ready for review before merging.");
            } else {
              console.log("✅ PR is ready for review");
            }

      # ── 6. No TODO / FIXME left in changed files ─────────────────────────
      - name: No TODO/FIXME in changed files
        id: no-todo
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.cs' '*.ts' '*.tsx' '*.vue' '*.js')
          if [ -z "$CHANGED" ]; then
            echo "No relevant changed files – skipping"
            exit 0
          fi
          HITS=$(echo "$CHANGED" | xargs grep -rn "TODO\|FIXME\|HACK\|XXX" 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ Found TODO/FIXME/HACK/XXX comments in changed files:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No TODO/FIXME/HACK/XXX comments found"

      # ── 7. Test files exist for new source files ─────────────────────────
      - name: New source files have corresponding test files
        id: test-coverage-check
        run: |
          MISSING=""
          # C# – expect a corresponding *Tests.cs or *Test.cs file anywhere in the repo
          while IFS= read -r file; do
            base=$(basename "$file" .cs)
            if ! git ls-files | grep -qE "${base}Tests?\.cs$"; then
              MISSING="${MISSING}\n  ⚠️  ${file}  (no *Tests.cs found)"
            fi
          done < <(git diff --name-only --diff-filter=A origin/main...HEAD -- 'src/backend/**/*.cs' \
                   | grep -vE '(Tests?|Spec|Fixture|AssemblyInfo|GlobalUsings)\.cs$' || true)

          # TypeScript/Vue – expect a *.spec.ts or *.test.ts alongside
          while IFS= read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file" .ts)
            base=${base%.vue}
            if ! git ls-files | grep -qE "${base}\.(spec|test)\.(ts|js)$"; then
              MISSING="${MISSING}\n  ⚠️  ${file}  (no *.spec.ts / *.test.ts found)"
            fi
          done < <(git diff --name-only --diff-filter=A origin/main...HEAD \
                   -- 'src/frontend/src/**/*.ts' 'src/frontend/src/**/*.vue' \
                   | grep -vE '\.(spec|test)\.(ts|js)$' || true)

          if [ -n "$MISSING" ]; then
            echo -e "⚠️  The following new files appear to have no test coverage:${MISSING}"
            echo "Consider adding unit/integration tests."
            # Warning only – does not fail the build
          else
            echo "✅ All new source files appear to have test coverage"
          fi

      # ── 8. No secrets / tokens committed ────────────────────────────────
      - name: Detect secrets in diff
        id: detect-secrets
        run: |
          # Heuristic check – detect common secret patterns in the diff
          DIFF=$(git diff origin/main...HEAD -- '*.cs' '*.ts' '*.vue' '*.env*' '*.json' '*.yml' '*.yaml' 2>/dev/null || true)
          PATTERNS=(
            'password\s*=\s*"[^"]+'
            'secret\s*=\s*"[^"]+'
            'api_key\s*=\s*"[^"]+'
            'apikey\s*=\s*"[^"]+'
            'token\s*=\s*"[^"]+'
            'AKIA[0-9A-Z]{16}'              # AWS Access Key
            'ghp_[0-9a-zA-Z]{36}'           # GitHub PAT
            'ey[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+'  # JWT
          )
          FOUND=""
          for p in "${PATTERNS[@]}"; do
            HIT=$(echo "$DIFF" | grep -iE "$p" | grep '^+' | grep -v '^+++' || true)
            if [ -n "$HIT" ]; then
              FOUND="${FOUND}\n${HIT}"
            fi
          done
          if [ -n "$FOUND" ]; then
            echo -e "❌ Possible secrets detected in diff:${FOUND}"
            exit 1
          fi
          echo "✅ No obvious secrets detected"

      # ── 9. EditorConfig / EOL compliance ────────────────────────────────
      - name: EditorConfig lint
        id: editorconfig
        run: |
          pip install editorconfig-checker --quiet
          ec -exclude ".git|node_modules|dist|.devcontainer" \
             $(git diff --name-only origin/main...HEAD) || true

      # ── 10. Aggregate and post PR comment ────────────────────────────────
      - name: Post Definition of Done summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status       = "${{ job.status }}";
            const emoji        = status === "success" ? "✅" : "❌";
            const prDesc       = "${{ steps.pr-description.outcome }}";
            const prDraft      = "${{ steps.pr-draft.outcome }}";
            const noTodo       = "${{ steps.no-todo.outcome }}";
            const testCoverage = "${{ steps.test-coverage-check.outcome }}";
            const noSecrets    = "${{ steps.detect-secrets.outcome }}";
            const editorCfg    = "${{ steps.editorconfig.outcome }}";

            const diffStats = {
              changed: "${{ steps.diff-stats.outputs.changed_files }}",
              additions: "${{ steps.diff-stats.outputs.additions }}",
              deletions: "${{ steps.diff-stats.outputs.deletions }}",
            };

            const row = (label, outcome, required = true) => {
              const icon = outcome === "success" ? "✅ passed"
                         : outcome === "skipped"  ? "⏭ skipped"
                         : required               ? "❌ failed"
                         : "⚠️ warning";
              return `| ${label} | ${icon} |`;
            };

            const body = [
              `## ${emoji} Project Quality – Definition of Done`,
              "",
              "### 📊 Diff Stats",
              `- **Changed files:** ${diffStats.changed}`,
              `- **Additions:** ${diffStats.additions}   **Deletions:** ${diffStats.deletions}`,
              "",
              "### ✔️ Definition of Done Checks",
              "",
              "| Check | Result |",
              "|-------|--------|",
              row("PR has a meaningful description (≥10 words)", prDesc),
              row("PR is not a draft", prDraft),
              row("No TODO / FIXME / HACK in changed files", noTodo),
              row("New source files have test coverage", testCoverage, false),
              row("No hardcoded secrets in diff", noSecrets),
              row("EditorConfig compliance", editorCfg, false),
              "",
              "> ℹ️  Items marked ⚠️ are advisory and do not block merging.",
              "",
              "_Triggered by: ${{ github.event.pull_request.head.sha }}_",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
