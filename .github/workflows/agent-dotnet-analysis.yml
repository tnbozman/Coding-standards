name: "Agent: .NET Static Code Analysis"

on:
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  dotnet-static-analysis:
    name: .NET Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Identify changed C# files ────────────────────────────────────
      - name: Get changed .NET files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/backend/**/*.cs
            src/backend/**/*.csproj
            src/backend/**/*.sln
            src/backend/**/*.props
            src/backend/**/*.targets

      # ── 3. Setup .NET 10 ────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      # ── 4. Restore ───────────────────────────────────────────────────────
      - name: Restore NuGet packages
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if ls src/backend/*.sln 1>/dev/null 2>&1; then
            dotnet restore src/backend
          elif ls src/backend/*.csproj 1>/dev/null 2>&1; then
            dotnet restore src/backend
          else
            echo "No solution or project found – skipping restore"
          fi

      # ── 5. Build with Roslyn analyzers ──────────────────────────────────
      - name: Build (Roslyn analysis)
        id: build
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if ls src/backend/*.sln 1>/dev/null 2>&1; then
            dotnet build src/backend \
              --no-restore \
              -warnaserror \
              /p:EnforceCodeStyleInBuild=true \
              /p:AnalysisMode=AllEnabledByDefault \
              /p:TreatWarningsAsErrors=false \
              /p:WarningsAsErrors="CS8600;CS8601;CS8602;CS8603;CS8604;CS8618;CS8625" \
              -v normal 2>&1 | tee build-output.txt
          else
            echo "No .NET project found – skipping build" | tee build-output.txt
          fi

      # ── 6. CSharpier format check ────────────────────────────────────────
      - name: CSharpier format check
        id: csharpier
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          dotnet tool install --global csharpier
          dotnet csharpier check src/backend || true

      # ── 7. dotnet-format style/analyzer check ───────────────────────────
      - name: dotnet-format (verify no changes)
        id: dotnet-format
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if ls src/backend/*.sln 1>/dev/null 2>&1 || ls src/backend/*.csproj 1>/dev/null 2>&1; then
            dotnet format src/backend --verify-no-changes --severity warn \
              2>&1 | tee format-output.txt || true
          fi

      # ── 8. SonarScanner analysis ─────────────────────────────────────────
      - name: SonarScanner analysis
        id: sonar
        if: |
          steps.changed-files.outputs.any_changed == 'true' &&
          env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin \
            /k:"${{ github.repository_owner }}_${{ github.event.repository.name }}" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.analyzer.projectOutPath=. \
            /d:sonar.pullrequest.key=${{ github.event.pull_request.number }} \
            /d:sonar.pullrequest.branch=${{ github.head_ref }} \
            /d:sonar.pullrequest.base=${{ github.base_ref }}

          dotnet build src/backend --no-restore

          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      # ── 9. Post PR comment summary ────────────────────────────────────────
      - name: Post analysis summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status   = "${{ job.status }}";
            const emoji    = status === "success" ? "✅" : "❌";
            const build    = "${{ steps.build.outcome }}";
            const fmt      = "${{ steps.dotnet-format.outcome }}";
            const csharpier= "${{ steps.csharpier.outcome }}";

            const row = (label, outcome) => {
              const icon = outcome === "success" ? "✅ passed"
                         : outcome === "skipped"  ? "⏭ skipped"
                         : "❌ failed";
              return `| ${label} | ${icon} |`;
            };

            const body = [
              `## ${emoji} .NET Static Code Analysis`,
              "",
              "| Check | Result |",
              "|-------|--------|",
              row("Roslyn build (with analyzers)", build),
              row("CSharpier format check", csharpier),
              row("dotnet-format verify", fmt),
              "",
              "_Triggered by: ${{ github.event.pull_request.head.sha }}_",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
