name: "Agent: Docker Security Analysis"

on:
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile*"
      - "**/*.dockerfile"
      - "**/docker-compose*.yml"
      - "**/docker-compose*.yaml"
      - ".devcontainer/**"

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  docker-security:
    name: Docker Security Analysis
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Find changed Docker files ────────────────────────────────────
      - name: Get changed Docker files
        id: changed-docker
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/Dockerfile*
            **/*.dockerfile
            **/docker-compose*.yml
            **/docker-compose*.yaml
            .devcontainer/**

      # ── 3. Hadolint – Dockerfile linting ────────────────────────────────
      - name: Hadolint (Dockerfile best-practices)
        id: hadolint
        if: steps.changed-docker.outputs.any_changed == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ steps.changed-docker.outputs.all_changed_files }}
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      # ── 4. Upload Hadolint SARIF ─────────────────────────────────────────
      - name: Upload Hadolint SARIF
        if: always() && steps.hadolint.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      # ── 5. Trivy – container image vulnerability scan ─────────────────────
      - name: Build devcontainer image for scanning
        id: build-image
        if: |
          steps.changed-docker.outputs.any_changed == 'true' &&
          contains(steps.changed-docker.outputs.all_changed_files, '.devcontainer')
        run: |
          docker build \
            --file .devcontainer/Dockerfile \
            --tag devcontainer-scan:${{ github.sha }} \
            .
        continue-on-error: true

      - name: Trivy – vulnerability scan (image)
        id: trivy-image
        if: steps.build-image.outcome == 'success'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devcontainer-scan:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: always() && steps.trivy-image.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      # ── 6. Trivy – IaC / config scan ──────────────────────────────────────
      - name: Trivy – IaC / misconfig scan
        id: trivy-config
        if: steps.changed-docker.outputs.any_changed == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-config-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy config SARIF
        if: always() && steps.trivy-config.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

      # ── 7. Checkov – Docker/IaC policy scan ─────────────────────────────
      - name: Checkov – IaC security policies
        id: checkov
        if: steps.changed-docker.outputs.any_changed == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: "."
          framework: dockerfile,docker_compose
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        if: always() && steps.checkov.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      # ── 8. Post PR comment summary ────────────────────────────────────────
      - name: Post analysis summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status    = "${{ job.status }}";
            const emoji     = status === "success" ? "✅" : "❌";
            const hadolint  = "${{ steps.hadolint.outcome }}";
            const trivyImg  = "${{ steps.trivy-image.outcome }}";
            const trivyCfg  = "${{ steps.trivy-config.outcome }}";
            const checkov   = "${{ steps.checkov.outcome }}";

            const row = (label, outcome) => {
              const icon = outcome === "success" ? "✅ passed"
                         : outcome === "skipped"  ? "⏭ skipped"
                         : "❌ failed";
              return `| ${label} | ${icon} |`;
            };

            const body = [
              `## ${emoji} Docker Security Analysis`,
              "",
              "| Check | Result |",
              "|-------|--------|",
              row("Hadolint (Dockerfile linting)", hadolint),
              row("Trivy (image vulnerabilities)", trivyImg),
              row("Trivy (IaC misconfigurations)", trivyCfg),
              row("Checkov (security policies)", checkov),
              "",
              "> Results also appear in **Security → Code Scanning** tab.",
              "",
              "_Triggered by: ${{ github.event.pull_request.head.sha }}_",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
